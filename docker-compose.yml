services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:2.19.3-pg14
    container_name: f1_postgres
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
      POSTGRES_DB: f1_intelligence_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schemas.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - f1_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user -d f1_intelligence_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: f1_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://f1user:f1password@postgres:5432/f1_intelligence_hub
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: f1_intelligence_hub
      DB_USER: f1user
      DB_PASSWORD: f1password
      FASTF1_CACHE_DIR: /app/fastf1_cache
      CORS_ORIGINS: ${CORS_ORIGINS}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS}
      RATE_LIMIT_API_MAX_REQUESTS: ${RATE_LIMIT_API_MAX_REQUESTS}
      RATE_LIMIT_ADMIN_MAX_REQUESTS: ${RATE_LIMIT_ADMIN_MAX_REQUESTS}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./:/workspace
      - ./fastf1_cache:/app/fastf1_cache
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - f1_network

  # Data loader — fully self-contained; no local Python or conda needed.
  # Build:  docker compose build loader
  # Run:    docker compose run --rm loader python scripts/initial_data_load.py 2026 --sync
  loader:
    build:
      context: .
      dockerfile: Dockerfile.loader
    container_name: f1_loader
    environment:
      DATABASE_URL: postgresql://f1user:f1password@postgres:5432/f1_intelligence_hub
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: f1_intelligence_hub
      DB_USER: f1user
      DB_PASSWORD: f1password
      FASTF1_CACHE_DIR: /app/fastf1_cache
    volumes:
      # FastF1 session cache — persists between runs so data isn't re-downloaded
      - ./fastf1_cache:/app/fastf1_cache
      # Circuit coordinate JSON files written back to the frontend's public dir
      - ./frontend/public/circuits:/app/frontend/public/circuits
      # circuitLayouts.ts written back to the frontend's lib dir
      - ./frontend/src/lib:/app/frontend/src/lib
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - f1_network
    profiles:
      - tools

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    container_name: f1_frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - f1_network

  # Persistent public tunnel via ngrok.
  # 1. Sign up free at https://ngrok.com
  # 2. Get your authtoken from https://dashboard.ngrok.com/get-started/your-authtoken
  # 3. Claim a free static domain at https://dashboard.ngrok.com/cloud-edge/domains
  # 4. Replace the values below and run: docker compose up -d
  ngrok:
    image: ngrok/ngrok:latest
    container_name: f1_ngrok
    command: http --url=repressively-faintish-helen.ngrok-free.dev --request-header-add="ngrok-skip-browser-warning:1" frontend:3000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - frontend
    networks:
      - f1_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  f1_network:
    driver: bridge
